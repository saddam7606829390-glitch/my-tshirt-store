
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saddam T-Shirt Store</title>
    <style>
        body { font-family: sans-serif; margin: 0; text-align: center; background: #f4f4f4; }
        .hero { 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('beti.jpg');
            background-size: cover; background-position: center;
            height: 300px; color: white; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: bold;
        }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card img { width: 100%; border-radius: 5px; }
        .buy-btn { display: block; background: #25d366; color: white; padding: 10px; text-decoration: none; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="hero">SADDAM'S T-SHIRT STORE ❤️</div>
    <div class="grid">
        <script>
            for(let i=1; i<=12; i++) {
                document.write(`
                    <div class="card">
                        <img src="${i}.jpg" onerror="this.src='https://via.placeholder.com/200x250?text=Design+${i}'">
                        <h3>T-Shirt #${i}</h3>
                        <p>Price: ₹599</p>
                        <a href="https://wa.me/917606829390" class="buy-btn">Order on WhatsApp</a>
                    </div>
                `);
            }
        </script>
    </div>
</body>
</html>
